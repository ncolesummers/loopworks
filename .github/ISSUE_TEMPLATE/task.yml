name: Task
description: Create an implementation or documentation task.
title: "[Task]: "
labels:
  - kind:task
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why is this task needed?
      placeholder: Explain the operational or delivery need.
    validations:
      required: true
  - type: textarea
    id: deliverable
    attributes:
      label: Deliverable
      description: What concrete output should exist?
      placeholder: Describe the result in a testable way.
    validations:
      required: true
  - type: input
    id: area
    attributes:
      label: Area
      description: Which area label should apply?
      placeholder: area:docs
    validations:
      required: true
  - type: input
    id: milestone
    attributes:
      label: Milestone
      description: Which milestone owns the task?
      placeholder: M0 Project Foundation
    validations:
      required: true
  - type: textarea
    id: adr
    attributes:
      label: ADR impact
      description: Does this change architecture, integrations, the data model, observability, security posture, or design-system direction? If so, link the relevant ADR or note that a Proposed ADR is expected. See docs/adr/README.md.
      placeholder: e.g. "Proposes a new ADR for the deploy-status integration" or "No architectural impact".
    validations:
      required: false

