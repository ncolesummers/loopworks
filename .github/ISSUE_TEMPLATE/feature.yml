name: Feature or Task
description: Create a product feature or implementation item.
title: "[Feature]: "
labels:
  - kind:feature
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What problem are we solving?
      placeholder: Explain the user or system need.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should be built?
      placeholder: Describe the implementation at a useful level.
    validations:
      required: true
  - type: input
    id: area
    attributes:
      label: Area
      description: Which area label should apply?
      placeholder: area:github
    validations:
      required: true
  - type: input
    id: milestone
    attributes:
      label: Milestone
      description: Which milestone owns the work?
      placeholder: M2 GitHub + Vercel Source Systems
    validations:
      required: true
