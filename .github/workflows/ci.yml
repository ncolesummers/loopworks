name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Biome format check
        run: bun run format:check

      - name: Biome lint
        run: bun run lint

      - name: Agent docs sync check
        run: bun run agent-docs:check

      - name: Markdownlint
        run: bun run markdownlint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test

      - name: Storybook build
        run: bun run storybook:build

      - name: Playwright
        run: bun run test:e2e
        env:
          LOOPWORKS_AUTH_BYPASS: "true"

  seeded-postgres-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: loopworks_e2e
          POSTGRES_PASSWORD: loopworks
          POSTGRES_USER: loopworks
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U loopworks -d loopworks_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Seeded Postgres Playwright
        run: bun run test:e2e:seeded
        env:
          DATABASE_URL: postgres://loopworks:loopworks@127.0.0.1:5432/loopworks_e2e
